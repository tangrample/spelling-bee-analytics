<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeeBot</title>
  <link rel="icon" type="image/svg+xml" href="bee.svg">
  <style>
    :root {
      --bg:         #ffffff;
      --bg-sec:     #f5f5f3;
      --text:       #1a1a1a;
      --muted:      #6b6b6b;
      --border:     rgba(0,0,0,0.09);
      --teal:       #1D9E75;
      --teal-light: #9FE1CB;
      --red:        #E24B4A;
      --amber:      #EF9F27;
      --r-card:     16px;
      --r-sm:       8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #1c1c1e;
        --bg-sec: #2c2c2e;
        --text:   #f0f0f0;
        --muted:  #8e8e93;
        --border: rgba(255,255,255,0.1);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-sec);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }
    .container { max-width: 780px; margin: 0 auto; padding: 1.5rem 1.25rem 2.5rem; }

    /* ── Header ──────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left h1 { font-size: 15px; font-weight: 500; }
    .header-left .meta { font-size: 12px; color: var(--muted); }
    .slide-counter { font-size: 12px; color: var(--muted); }

    /* ── Carousel ────────────────────────────────────────────────── */
    .carousel-outer {
      overflow: hidden;
      border-radius: var(--r-card);
      border: 0.5px solid var(--border);
      background: var(--bg);
      height: 420px;
    }
    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slide {
      min-width: 100%;
      height: 100%;
      padding: 1.75rem 2rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .slide-scroll { overflow: hidden; }
    .slide-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      flex-shrink: 0;
    }

    /* ── Nav ─────────────────────────────────────────────────────── */
    .carousel-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 1rem;
    }
    .nav-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 0.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      transition: opacity 0.2s;
    }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .dots { display: flex; gap: 6px; align-items: center; }
    .dot {
      height: 6px; width: 6px;
      border-radius: 3px;
      background: var(--border);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .dot.active { width: 18px; background: var(--teal); }

    /* ── Slide 1: Overview ───────────────────────────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.75rem 2.5rem;
      flex: 1;
      align-content: center;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 4px;
    }
    .stat-big { font-size: 44px; font-weight: 500; line-height: 1; margin: 0; }
    .stat-week { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 5px; }
    .stat-alltime { font-size: 11px; color: var(--muted); margin: 5px 0 0; }

    /* ── Word list (slides 2 & 3) ────────────────────────────────── */
    .word-list { flex: 1; overflow-y: auto; min-height: 0; }
    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 6px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 2px;
    }
    .section-label.spaced { margin-top: 10px; }
    .word-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .word-row:last-child { border-bottom: none; }
    .word-left { display: flex; align-items: center; gap: 7px; }
    .word-name { font-size: 15px; font-weight: 500; }
    .word-def { font-size: 12px; color: var(--muted); text-align: right; flex-shrink: 0; margin-left: 8px; }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-red    { background: #FCEBEB; color: #A32D2D; }
    .badge-amber  { background: #FAEEDA; color: #854F0B; }
    .badge-teal   { background: #E1F5EE; color: #0F6E56; }
    .badge-purple { background: #EEEDFE; color: #534AB7; }
    .badge-date   { background: #E1F5EE; color: #0F6E56; font-size: 10px; padding: 1px 6px; }

    /* ── Chart (slide 4) ─────────────────────────────────────────── */
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
      flex-shrink: 0;
    }
    .chart-title { font-size: 13px; font-weight: 500; }
    .legend { display: flex; gap: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .chart-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .chart-body { flex: 1; display: flex; min-height: 0; }
    .y-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-bottom: 0;
      padding-right: 6px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .y-label { font-size: 10px; color: var(--muted); }
    .bars {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      border-left: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      position: relative;
      padding: 0 8px;
    }
    .grid-line {
      position: absolute;
      left: 0; right: 0;
      height: 0.5px;
      background: var(--border);
    }
    .bar-group { display: flex; gap: 3px; align-items: flex-end; z-index: 1; height: 100%; }
    .bar { width: 14px; border-radius: 3px 3px 0 0; min-height: 2px; position: relative; cursor: default; }
    .bar:hover::after {
      content: attr(data-val);
      position: absolute;
      top: -22px; left: 50%;
      transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      padding: 2px 5px; border-radius: 4px;
      font-size: 10px; white-space: nowrap;
      pointer-events: none; z-index: 10;
    }
    .x-labels { display: flex; justify-content: space-around; padding: 5px 8px 0; flex-shrink: 0; }
    .x-label { font-size: 11px; color: var(--muted); }

    /* ── Length bars (slide 5) ───────────────────────────────────── */
    .len-rows { display: flex; flex-direction: column; gap: 14px; flex: 1; justify-content: center; }
    .len-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .len-label { font-size: 13px; color: var(--muted); }
    .len-pct   { font-size: 13px; font-weight: 500; }
    .bar-track { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 3px; }

    /* ── Insight line ────────────────────────────────────────────── */
    .insight {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
      border-top: 0.5px solid var(--border);
      padding-top: 12px;
      flex-shrink: 0;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer { font-size: 11px; color: var(--muted); margin-top: 0.75rem; text-align: center; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .slide { padding: 1.25rem; }
      .overview-grid { gap: 1.25rem 1.5rem; }
      .stat-big { font-size: 36px; }
      .carousel-outer { height: 460px; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <div style="padding:4rem;text-align:center;color:var(--muted);">Loading…</div>
</div>

<script>
fetch('data.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(() => {
    document.getElementById('app').innerHTML =
      '<div style="padding:4rem;text-align:center;color:#A32D2D;">⚠️ Could not load data.json</div>';
  });

function render(d) {
  const s  = d.summary;
  const rc = d.recent || {};
  const hasRecent = (rc.games || 0) > 0;

  // ── Helpers ────────────────────────────────────────────────────
  function fmtDate(iso) {
    return new Date(iso + 'T12:00:00').toLocaleDateString('en-US',
      { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fmtMonthShort(ym) {
    return ['Jan','Feb','Mar','Apr','May','Jun',
            'Jul','Aug','Sep','Oct','Nov','Dec'][+ym.split('-')[1] - 1];
  }
  function missBadge(pct) {
    return pct >= 80 ? 'badge-red' : pct >= 50 ? 'badge-amber' : 'badge-teal';
  }
  function lenBadge(len) {
    return len >= 10 ? 'badge-purple' : len >= 8 ? 'badge-amber' : 'badge-teal';
  }
  function barColor(pct) {
    return pct >= 28 ? 'var(--red)' : pct >= 20 ? 'var(--amber)' : 'var(--teal)';
  }

  // ── Recent word cutoff (7 days) ──────────────────────────────
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const recentWords  = d.study_words.filter(w => w.last_missed && w.last_missed >= cutoffStr);
  const allTimeWords = d.study_words.filter(w => !w.last_missed || w.last_missed < cutoffStr);

  // ── Word row ─────────────────────────────────────────────────
  function wordRow(w, showDate) {
    const dateBadge = showDate && w.last_missed
      ? `<span class="badge badge-date">${new Date(w.last_missed + 'T12:00:00')
          .toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>`
      : '';
    return `
      <div class="word-row">
        <div class="word-left">
          <span class="word-name">${w.word}</span>
          <span class="badge ${missBadge(w.miss_pct)}">${w.miss_pct}% · ${w.appearances}×</span>
          ${dateBadge}
        </div>
        <span class="word-def">${w.definition || (w.length + '-letter word')}</span>
      </div>`;
  }

  // ── Pangram row ──────────────────────────────────────────────
  function pangramRow(p) {
    const dt = new Date(p.date + 'T12:00:00')
      .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `
      <div class="word-row">
        <div class="word-left">
          <span class="word-name">${p.word}</span>
          <span class="badge ${lenBadge(p.length)}">${p.length} letters</span>
        </div>
        <span class="word-def">${dt}</span>
      </div>`;
  }

  // ── Monthly chart (div bars, scale 60–90%) ───────────────────
  const minY = 60, maxY = 90, yRange = maxY - minY;
  function barH(val) {
    return Math.max(0, Math.min(100, (val - minY) / yRange * 100)).toFixed(1) + '%';
  }
  const barGroups = d.monthly.map(m => `
    <div class="bar-group">
      <div class="bar" style="height:${barH(m.score_pct)};background:var(--teal);" data-val="${m.score_pct}%"></div>
      <div class="bar" style="height:${barH(m.words_pct)};background:var(--teal-light);" data-val="${m.words_pct}%"></div>
    </div>`).join('');
  const xLabels = d.monthly.map(m =>
    `<span class="x-label">${fmtMonthShort(m.month)}</span>`).join('');

  const lastM = d.monthly[d.monthly.length - 1];
  const bestM = d.monthly.reduce((b, m) => m.score_pct > b.score_pct ? m : b, d.monthly[0]);
  const chartInsight = lastM.score_pct >= bestM.score_pct
    ? `Trending up — ${fmtMonthShort(lastM.month)} is your strongest month yet (${lastM.score_pct}%).`
    : `Best month so far: ${fmtMonthShort(bestM.month)} at ${bestM.score_pct}%.`;

  // ── Length bars ──────────────────────────────────────────────
  const lenBars = d.miss_by_length.map(r => `
    <div>
      <div class="len-header">
        <span class="len-label">${r.label}</span>
        <span class="len-pct" style="color:${barColor(r.miss_pct)};">${r.miss_pct.toFixed(0)}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${r.miss_pct}%;background:${barColor(r.miss_pct)};"></div>
      </div>
    </div>`).join('');

  // ── Overview stat cell ───────────────────────────────────────
  function overviewStat(label, weekFmt, allTimeFmt, color) {
    const c = color ? ` style="color:${color};"` : '';
    if (hasRecent) {
      return `
        <div>
          <p class="stat-label">${label}</p>
          <p class="stat-big"${c}>${weekFmt}<span class="stat-week">this week</span></p>
          <p class="stat-alltime">${allTimeFmt} all time</p>
        </div>`;
    }
    return `
      <div>
        <p class="stat-label">${label}</p>
        <p class="stat-big"${c}>${allTimeFmt}</p>
        <p class="stat-alltime">across all ${s.total_games} games</p>
      </div>`;
  }

  // ── Study words insight ──────────────────────────────────────
  const topWord = d.study_words[0];
  const studyInsight = topWord
    ? (topWord.miss_pct === 100
        ? `${topWord.word} has appeared ${topWord.appearances}× — you've never found it.`
        : `${topWord.word} tops the list — missed ${topWord.miss_pct}% of ${topWord.appearances} appearances.`)
    : '';

  // ── Bee SVG (header) ─────────────────────────────────────────
  const beeSvg = `<svg width="34" height="34" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true" style="flex-shrink:0;">
    <defs><clipPath id="bh"><ellipse cx="16" cy="22" rx="9" ry="9"/></clipPath></defs>
    <ellipse cx="8"   cy="14" rx="7" ry="4" fill="white" stroke="#111" stroke-width="1.2" opacity=".85"/>
    <ellipse cx="24"  cy="14" rx="7" ry="4" fill="white" stroke="#111" stroke-width="1.2" opacity=".85"/>
    <ellipse cx="16"  cy="22" rx="9" ry="9" fill="#F5C833" stroke="#111" stroke-width="1.5"/>
    <rect x="7" y="18" width="18" height="3.5" fill="#333" clip-path="url(#bh)"/>
    <rect x="7" y="24" width="18" height="3.5" fill="#333" clip-path="url(#bh)"/>
    <circle cx="16"   cy="10" r="6"   fill="#F5C833" stroke="#111" stroke-width="1.5"/>
    <circle cx="13.5" cy="9"  r="1.2" fill="#111"/>
    <circle cx="18.5" cy="9"  r="1.2" fill="#111"/>
    <path d="M13,5 Q11,2 10,1" stroke="#111" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <circle cx="9.5"  cy="1"  r="1.2" fill="#111"/>
    <path d="M19,5 Q21,2 22,1" stroke="#111" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <circle cx="22.5" cy="1"  r="1.2" fill="#111"/>
  </svg>`;

  // ── Build HTML ───────────────────────────────────────────────
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        ${beeSvg}
        <div>
          <h1>BeeBot</h1>
          <div class="meta">${s.total_games} games · ${fmtDate(s.first_date)} – ${fmtDate(s.last_date)}</div>
        </div>
      </div>
      <span class="slide-counter" id="slide-counter">1 / 5</span>
    </div>

    <div class="carousel-outer">
      <div class="carousel-track" id="carousel-track">

        <!-- Slide 1: Overview -->
        <div class="slide">
          <div class="slide-label">Overview</div>
          <div class="overview-grid">
            ${overviewStat('Avg score',
                rc.avg_score_pct + '%',
                s.avg_score_pct + '%',
                'var(--teal)')}
            ${overviewStat('Genius rate',
                rc.genius_count + '/' + rc.games,
                s.genius_rate + '%')}
            ${overviewStat('Pangrams found',
                rc.pangram_found + '/' + (rc.pangram_total || '?'),
                s.pangram_pct + '%')}
            ${overviewStat('Word miss rate',
                rc.word_miss_rate + '%',
                s.word_miss_rate + '%')}
          </div>
        </div>

        <!-- Slide 2: Words to study -->
        <div class="slide slide-scroll">
          <div class="slide-label">Words to study</div>
          <div class="word-list">
            ${recentWords.length > 0 ? `
              <div class="section-label">Recent</div>
              ${recentWords.map(w => wordRow(w, true)).join('')}
              <div class="section-label spaced">All time · highest miss rate</div>
            ` : ''}
            ${allTimeWords.map(w => wordRow(w, false)).join('')}
          </div>
          ${studyInsight ? `<p class="insight">${studyInsight}</p>` : ''}
        </div>

        <!-- Slide 3: Missed pangrams -->
        <div class="slide slide-scroll">
          <div class="slide-label">Missed pangrams — ${s.pangram_missed} total</div>
          <div class="word-list">
            ${d.missed_pangrams.map(pangramRow).join('')}
          </div>
          <p class="insight">${s.pangram_miss_pct}% pangram miss rate — most are long compound words.</p>
        </div>

        <!-- Slide 4: Monthly trend -->
        <div class="slide">
          <div class="chart-header">
            <span class="chart-title">Score &amp; words found % by month</span>
            <div class="legend">
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--teal);"></div>Score %
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--teal-light);"></div>Words %
              </div>
            </div>
          </div>
          <div class="chart-area">
            <div class="chart-body">
              <div class="y-axis">
                <span class="y-label">90%</span>
                <span class="y-label">75%</span>
                <span class="y-label">60%</span>
              </div>
              <div class="bars">
                <div class="grid-line" style="top:0;"></div>
                <div class="grid-line" style="top:50%;"></div>
                ${barGroups}
              </div>
            </div>
            <div class="x-labels">${xLabels}</div>
          </div>
          <p class="insight">${chartInsight}</p>
        </div>

        <!-- Slide 5: Miss by length -->
        <div class="slide">
          <div class="slide-label">Miss rate by word length</div>
          <div class="len-rows">${lenBars}</div>
          <p class="insight">Mostly cheap losses — 4-letter words are only worth 1 pt.</p>
        </div>

      </div>
    </div>

    <div class="carousel-nav">
      <button class="nav-btn" id="prev-btn" aria-label="Previous">&#8249;</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="next-btn" aria-label="Next">&#8250;</button>
    </div>

    <div class="footer">
      Reflects data from ${s.total_games} puzzles (${fmtDate(s.first_date)} – ${fmtDate(s.last_date)}).
      Word miss stats exclude ${s.total_games - s.games_with_answers} games with incomplete data.
    </div>
  `;

  initCarousel(5);
}

function initCarousel(n) {
  const track   = document.getElementById('carousel-track');
  const dotsEl  = document.getElementById('dots');
  const counter = document.getElementById('slide-counter');
  let cur = 0;

  for (let i = 0; i < n; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  }

  function goTo(i) {
    cur = Math.max(0, Math.min(n - 1, i));
    track.style.transform = `translateX(-${cur * 100}%)`;
    counter.textContent = (cur + 1) + ' / ' + n;
    document.getElementById('prev-btn').disabled = cur === 0;
    document.getElementById('next-btn').disabled = cur === n - 1;
    dotsEl.querySelectorAll('.dot').forEach((d, idx) =>
      d.classList.toggle('active', idx === cur));
  }

  document.getElementById('prev-btn').addEventListener('click', () => goTo(cur - 1));
  document.getElementById('next-btn').addEventListener('click', () => goTo(cur + 1));

  // Touch swipe
  let tx = null;
  track.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    if (tx === null) return;
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 50) goTo(cur + (dx < 0 ? 1 : -1));
    tx = null;
  }, { passive: true });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(cur - 1);
    if (e.key === 'ArrowRight') goTo(cur + 1);
  });

  goTo(0);
}
</script>
</body>
</html>
